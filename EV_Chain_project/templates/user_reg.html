{% extends 'base.html' %}

{% block title %}EV Chain | Register{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
        <div class="card-body p-4 p-lg-5">
            <div class="text-center mb-4">
                <div class="icon-circle bg-info-subtle text-info mb-3 mx-auto"><i class="fa-solid fa-user-plus"></i></div>
                <h3 class="fw-bold mb-2">Create your account</h3>
                <p class="text-muted mb-0">Join EV Chain and start managing your EV charging experience.</p>
            </div>
            <form action="" method="POST">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">First Name</label>
                        <input type="text" class="form-control" name="first_name" placeholder="Enter your first name">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Last Name</label>
                        <input type="text" class="form-control" name="last_name" placeholder="Enter your last name">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Place</label>
                        <input type="text" class="form-control" name="place" placeholder="Enter your place">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Post</label>
                        <input type="text" class="form-control" name="post" placeholder="Enter your post office name">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">PIN</label>
                        <input type="text" class="form-control" name="pin" placeholder="Enter your pincode">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Gender</label>
                        <div class="d-flex gap-3 mt-2">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="gender" value="male">
                                <label class="form-check-label">Male</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="gender" value="female">
                                <label class="form-check-label">Female</label>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Phone No</label>
                        <input type="text" class="form-control" name="phone" placeholder="Enter your phone number">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Email</label>
                        <input type="email" class="form-control" name="email" placeholder="Enter your email address">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Username</label>
                        <input type="text" class="form-control" name="username" placeholder="Enter username">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Password</label>
                        <input type="password" class="form-control" name="password" placeholder="Enter password">
                    </div>
                </div>
                <div class="text-center mt-4">
                    <button type="submit" name="submit" class="btn btn-ev-primary px-4 fw-semibold">Register</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
