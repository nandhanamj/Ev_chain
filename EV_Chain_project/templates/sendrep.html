{% extends 'base.html' %}

{% block title %}EV Chain | Send Reply{% endblock %}

{% block header %}
    {% include 'admin_header.html' %}
{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card border-0 shadow-lg rounded-4">
                <div class="card-body p-4 p-lg-5">
                    <div class="text-center mb-4">
                        <div class="icon-circle bg-success-subtle text-success mb-3 mx-auto"><i class="fa-solid fa-reply"></i></div>
                        <h3 class="fw-bold mb-2">Send a reply</h3>
                        <p class="text-muted mb-0">Respond to the user complaint with a clear update.</p>
                    </div>
                    <form action="" method="post">
                        {% csrf_token %}
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Reply</label>
                            <textarea class="form-control" name="reply" rows="4" placeholder="Type your reply here"></textarea>
                        </div>
                        <div class="text-center">
                            <button type="submit" name="submit" class="btn btn-ev-primary px-4 fw-semibold">Send Reply</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
